    risk: dynamic
    approval: if_destructive
  payments.submit:
    risk: high
    approval: always
  # Self-edit is checkpoint-backed and fully reversible via code.rollback, so we
  # let the agent edit its own code without a per-edit approval prompt. Every
  # edit is audited; protected paths (.env, secrets, .git, node_modules) are
  # refused by the executor.
  code.self_edit:
    risk: medium
    approval: false
  code.propose_patch:
    risk: low
    approval: false
  code.apply_patch_after_approval:
    risk: high
    approval: always
  code.run_tests:
    risk: low
    approval: false
  code.rollback:
    risk: high
    approval: always
  memory.remember:
    risk: low
    approval: false
  memory.forget:
    risk: low
    approval: false
  memory.search:
    risk: read
    approval: false
  web.fetch:
    risk: low
    approval: false

blocked:
  - disable_approval_broker
  - self_modify_policy
  - exfiltrate_credentials
  - send_secrets_to_external_domain
  - permanent_delete_without_trash
  - grant_self_permissions
  - bypass_user_approval
